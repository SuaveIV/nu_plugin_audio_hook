on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */2 * *'

name: Update dependencies

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Install ALSA packages
        run: |
          sudo apt-get update
          sudo apt-get install -y alsa-utils libasound2-dev

      - name: Setup Nushell
        uses: hustcer/setup-nu@920172d92eb04671776f3ba69d605d3b09351c30  # v3
        with:
          version: "0.110.0"

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Upgrade dependencies
        id: upgrade
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: nu {0}
        run: |
          def "gh latest tag" [repo: string]: nothing -> string {
            http get --headers [Authorization $"Bearer ($env.GITHUB_TOKEN)"] $"https://api.github.com/repos/($repo)/releases/latest"
              | get tag_name
          }

          let plugin_repository = "nushell/nushell"
          let plugin_version = (try {
              http get https://crates.io/api/v1/crates/nu-plugin?include=keywords%2Ccategories%2Cdownloads%2Cdefault_version
                | get crate.default_version
            } catch {
              gh latest tag $plugin_repository
            })

          $plugin_version | str replace --regex "^v" "" | let sanitized_plugin_version: string

          mut content = (open Cargo.toml --raw)

          # Update package version
          $content = ($content | str replace --regex '(?m)^(version\s*=\s*)".*?"' $"${1}\"($sanitized_plugin_version)\"")

          let toml_data = (open Cargo.toml)

          ($toml_data.dependencies? | default {} | columns)
            | append ($toml_data.dev-dependencies? | default {} | columns)
            | where ($it =~ "^nu-.*")
            | uniq
            | let nu_deps: list<string>

          $content = ($nu_deps | reduce --fold $content {|dep, acc|
            $acc
              | str replace --regex ("(?m)^(" + $dep + "\\s*=\\s*)\".*?\"") ("${1}\"" + $sanitized_plugin_version + "\"")
              | str replace --regex ("(?s)(\\[dependencies\\." + $dep + "\\][^\\[]*?version\\s*=\\s*)\".*?\"") ("${1}\"" + $sanitized_plugin_version + "\"")
              | str replace --regex ("(?m)^(" + $dep + "\\s*=.*version\\s*=\\s*)\"[^\"]+\"") ("${1}\"" + $sanitized_plugin_version + "\"")
          })

          $content | save --force Cargo.toml

          open nupm.nuon --raw
            | str replace --regex '(\s*version:\s*)".*?"' $"${1}\"($sanitized_plugin_version)\""
            | save --force nupm.nuon

          rm --force Cargo.lock
          cargo update
          cargo check

      - name: Update CONTRIBUTORS.md
        run: |
          echo "# Contributors" > CONTRIBUTORS.md
          echo "" >> CONTRIBUTORS.md
          git shortlog -sn --all \
            | grep -v "GitHub-Action" \
            | awk '{
                count=$1; $1="";
                sub(/^ /, "");
                plural = (count == 1) ? "commit" : "commits";
                print "- **"count" "plural"** — "$0
              }' >> CONTRIBUTORS.md

      - name: Extract Version
        id: extract_version
        shell: nu {0}
        run: |
          open Cargo.toml | get package.version | str trim | let version: string
          $"version=($version)" | save --force $env.GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump dependencies to ${{ steps.extract_version.outputs.version }} and update contributors"
          title: "chore: update dependencies to v${{ steps.extract_version.outputs.version }}"
          body: "Automated PR to update Nushell dependencies and contributors."
          branch: "chore/update-dependencies"
          author: "GitHub-Action <action@github.com>"
          labels: "dependencies"
