on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */2 * *'

name: Update dependencies

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Install ALSA packages
        run: |
          sudo apt-get update
          sudo apt-get install -y alsa-utils libasound2-dev

      - name: Setup Nushell
        uses: hustcer/setup-nu@920172d92eb04671776f3ba69d605d3b09351c30  # v3
        with:
          version: "0.111.0"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Upgrade dependencies
        id: upgrade
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: nu {0}
        run: |
          def "http-get-with-retry" [url: string, max_retries: int = 3, timeout: duration = 10sec]: nothing -> any {
            mut last_err = null
            for attempt in 1..$max_retries {
              let err = try {
                return (http get --max-time $timeout $url)
              } catch {|e| $e }

              $last_err = $err
              if $attempt < $max_retries {
                sleep (($attempt * 200) * 1ms)
              }
            }
            error make {
              msg: $"Failed to fetch ($url) after ($max_retries) attempts"
              help: ($last_err | get msg? | default "unknown error")
            }
          }

          def "gh latest tag" [repo: string]: nothing -> string {
            http-get-with-retry $"https://api.github.com/repos/($repo)/releases/latest" 3 10sec
              | get tag_name
          }

          def "validate-version-format" [version: string]: nothing -> bool {
            if ($version | is-empty) {
              return false
            }
            let numeric_part = ($version | str replace --regex "^v" "")
            return ($numeric_part =~ '^[0-9]+(\.[0-9]+)*$')
          }

          let plugin_repository = "nushell/nushell"
          let plugin_version = (try {
              http-get-with-retry "https://crates.io/api/v1/crates/nu-plugin?include=keywords%2Ccategories%2Cdownloads%2Cdefault_version" 3 10sec
                | get crate.default_version
            } catch {
              gh latest tag $plugin_repository
            })

          if not (validate-version-format $plugin_version) {
            error make {msg: $"Invalid version format received: ($plugin_version)"}
          }

          let sanitized_plugin_version: string = ($plugin_version | str replace --regex "^v" "")

          mut content = (open Cargo.toml --raw)
          let toml_data = ($content | from toml)

          let nu_deps: list<string> = (
            ($toml_data.dependencies? | default {} | columns)
            | append (($toml_data | get "dev-dependencies"?) | default {} | columns)
            | where {|dep| $dep =~ "^nu-.*"}
            | uniq
          )

          $content = ($nu_deps | reduce --fold $content {|dep, acc|
            let escaped_dep = ($dep | str replace --regex "([\\[\\]\\(\\)\\*\\+\\?\\^\\$\\.\\|])" "\\$1")
            $acc
              | str replace --regex $"\\(?m\\)^\\(($escaped_dep)\\s*=\\s*\\)\".*?\"" $"${1}\"($sanitized_plugin_version)\""
              | str replace --regex $"\\(?s\\)\\(\\[(?:dev-)?dependencies\\.($escaped_dep)\\](?m)(?:\\n[^\\[].*)*?\\n\\s*version\\s*=\\s*\\)\".*?\"" $"${1}\"($sanitized_plugin_version)\""
              | str replace --regex $"\\(?m\\)^\\(($escaped_dep)\\s*=.*version\\s*=\\s*\\)\"[^\"]+\"" $"${1}\"($sanitized_plugin_version)\""
          })

          $content | save --force Cargo.toml

          rm --force Cargo.lock
          ^cargo update
          ^cargo check
          $"sanitized_plugin_version=($sanitized_plugin_version)\n" | save --append $env.GITHUB_OUTPUT

      - name: Update CONTRIBUTORS.md
        run: |
          echo "# Contributors" > CONTRIBUTORS.md
          echo "" >> CONTRIBUTORS.md
          git shortlog -sn --all \
            | grep -v "GitHub-Action" \
            | awk '{
                count=$1; $1="";
                sub(/^ /, "");
                plural = (count == 1) ? "commit" : "commits";
                print "- **"count" "plural"** — "$0
              }' >> CONTRIBUTORS.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump dependencies to ${{ steps.upgrade.outputs.sanitized_plugin_version }} and update contributors"
          title: "chore: update dependencies to v${{ steps.upgrade.outputs.sanitized_plugin_version }} and update contributors"
          body: "Automated PR to update Nushell dependencies and contributors."
          branch: "chore/update-dependencies"
          author: "GitHub-Action <action@github.com>"
          labels: "dependencies"
